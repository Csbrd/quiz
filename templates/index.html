<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 기술면접 대비 퀴즈</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Pretendard', sans-serif; }
        .hero-section { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; width: 100%; max-width: 400px; }
        .btn-primary { background-color: #0d6efd; border: none; padding: 0.8rem; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="hero-section">
        <div class="login-card text-center">
            <h2 class="mb-4">💻 CS Quiz AI</h2>
            <p class="text-muted mb-4">Gemini가 생성하는 최신 CS 문제를<br>지금 바로 풀어보세요.</p>
            <form action="/start_quiz" method="post">
                <input type="text" name="user_name" class="form-control mb-3" placeholder="사용자 이름을 입력하세요" required>
                <button type="submit" class="btn btn-primary w-100">퀴즈 시작하기</button>
            </form>
        </div>
    </div>
</body>
</html>
